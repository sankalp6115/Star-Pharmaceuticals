<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visuals</title>

<script src="./js/fuse.js"></script>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/visual.css">
</head>

<body>
<div class="app">
<div class="header">
  <button id="backBtn" onclick="window.location.href='index.html'">🏠</button>
  <h3>Visuals</h3>
  <button id="addBtn" class="">Add</button>
</div>
<input id="search" placeholder="Search..." style="width:100%; margin:10px 0;" class="">

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="box ">
    <button class="closeBtn" onclick="modal.style.display='none'">❌</button>
    <input id="name" placeholder="Name" class="">
    <input id="category" placeholder="Category" class="">
    <input id="image" type="file" class="">
    <button id="save" class="">Save</button>
  </div>
</div>

<div class="modal" id="imageModal">
  <div class="box" style="text-align:center;">
    <button class="closeBtn" onclick="imageModal.style.display='none'">❌</button>
    <img id="largeImage" style="max-width:100%; max-height:80vh; border-radius:8px;">
    <div id="imageCaption" style="margin-top:10px; font-weight:bold;"></div>
  </div>
</div>
<script src="js/visual.js" type="module"></script>
</body>
</html>
