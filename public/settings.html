<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <button id="backBtn" onclick="window.location.href='index.html'">🏠</button>
            <h3>Settings</h3>
        </div>

        <div class="settings-section">
            <h4>Data Management</h4>
            <button id="exportDataBtn">Export Data</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
            <button id="importDataBtn">Import Data</button>
            <button id="clearDataBtn">Clear Data</button>
            <div id="clearConfirmation" style="display: none;">
                <p>Type "DELETE" to confirm:</p>
                <input type="text" id="deleteConfirmationInput">
                <button id="confirmDeleteBtn">Confirm Delete</button>
                <button id="cancelDeleteBtn">Cancel</button>
            </div>
        </div>

        <div class="settings-section">
            <h4>Summary</h4>
            <p>Total Items: <span id="totalItems">0</span></p>
            <p>Completed Orders: <span id="completedOrders">0</span></p>
            <p>Existing Orders: <span id="existingOrders">0</span></p>
            <p>Total Orders: <span id="totalOrders">0</span></p>
        </div>
    </div>
    <script src="js/settings.js" type="module"></script>
</body>
</html>
